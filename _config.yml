# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Sumit Sadhu
first_name: Sumit
middle_name:
last_name: Sadhu
email: # add your email
description: > # tagline shown in meta tags
  Portfolio of projects by Sumit Sadhu.
footer_text: >
  Built with <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> and the
  <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme.
keywords: portfolio, projects, software, developer
lang: en
icon: 💻

# -----------------------------------------------------------------------------
# URL / GitHub Pages
# -----------------------------------------------------------------------------
url: https://sumitsadhu1.github.io
baseurl:
last_updated: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: true
max_width: 930px

# Theme colors
display_mode: light
display_mode_chooser: true

# -----------------------------------------------------------------------------
# Open Graph & social media
# -----------------------------------------------------------------------------
serve_og_meta: true
og_image: # path to a default social-share image, e.g. /assets/img/og.png

# -----------------------------------------------------------------------------
# Navigation — projects-only
# -----------------------------------------------------------------------------
# Disable everything except About + Projects + (optional) Repositories.
# al-folio reads `nav` flags from individual _pages/*.md files; the simplest
# way to hide a section is to set `nav: false` in those page front-matters.

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------
github_username: sumitsadhu1
linkedin_username: # optional
twitter_username:  # optional
scholar_userid:    # leave blank
contact_note: >
  Reach me on GitHub.

# -----------------------------------------------------------------------------
# Repositories section (auto-renders cards from GitHub API)
# -----------------------------------------------------------------------------
# Shown on the about/repositories page when enabled in the page front-matter.
github_users:
  - sumitsadhu1

# List specific repos to feature (replace with your real repo names)
github_repos:
  - sumitsadhu1/project-one
  - sumitsadhu1/project-two
  - sumitsadhu1/project-three

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  projects:
    output: true
    permalink: /projects/:path/

# -----------------------------------------------------------------------------
# Disable unused features
# -----------------------------------------------------------------------------
blog_name:
blog_description:
permalink: /blog/:year/:title/
pagination:
  enabled: false

# Disable academic features not needed for a projects-only site
enable_publications: false
enable_news: false
enable_cv: false
